syntax = "proto3";

option csharp_namespace = "Examples.Web.WebApi.Grpc.Inspection";
package inspection;

import "google/api/annotations.proto";
import "google/api/httpbody.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// The inspector service definition.
service Inspector {
  // For learning FluentValidation
  rpc Validation (ValidationRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/validation"
      body: "*"
    };
  }

  // For learning HttpBody Response
  rpc Download (DownloadRequest) returns (google.api.HttpBody) {
    option (google.api.http) = {
      get: "/v1/downloads/{id}/{filename}"
    };
  }

  // For learning PassThrough gRPCCall.
  rpc PassThroughGreeter (PassThroughGreeterRequest) returns (PassThroughGreeterReply) {
    option (google.api.http) = {
      get: "/v1/passthrough/greeter/{name}"
    };
  }
}

// The validation status.
enum ValidationStatus {
  VALIDATION_STATUS_UNKNOWN = 0;
  VALIDATION_STATUS_SUCCESS = 1;
  VALIDATION_STATUS_FAILURE = 2;
}

// The validation item.
message ValidationItem {
  string id       = 1;
  int32  quantity = 2;
}

// The request message for learning FluentValidation.
message ValidationRequest {
  string                    name       = 1;
  ValidationStatus          status     = 2;
  google.protobuf.Timestamp created_at = 3;

  string date_ymd_from = 4; // (yyyy-MM-dd)
  string date_ymd_to   = 5; // (yyyy-MM-dd)
  string time_hms_from = 6; // (HH:mm:ss)
  string time_hms_to   = 7; // (HH:mm:ss)

  repeated ValidationItem items = 8;
}

// The request message for download.
message DownloadRequest {
  string id       = 1;
  string filename = 2;
}

// The request message for learning PassThrough gRPCCall.
message PassThroughGreeterRequest {
  string name = 1;
}

// The response message for learning PassThrough gRPCCall.
message PassThroughGreeterReply {
  string message = 1;
}

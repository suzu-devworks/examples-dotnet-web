services:
  dev:
    image: mcr.microsoft.com/devcontainers/dotnet:10.0
    networks:
      - interconnect
    tty: true
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${KESTREL_CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/etc/ssl/local/localhost.pfx
    volumes:
      # Forwards the local Docker socket to the container.
      - /var/run/docker.sock:/var/run/docker-host.sock
      # Update this to wherever you want VS Code to mount the folder of your project
      - ../../:/workspaces:cached
      # Use SSL server certificate
      - ./web/ssl:/etc/ssl/local:ro
      # Use Data Protection keys
      - ./.keys:/home/vscode/.aspnet/DataProtection-Keys:rw

networks:
  interconnect:
    driver: bridge

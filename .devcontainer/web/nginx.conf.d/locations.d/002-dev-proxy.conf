# Development proxy for the web application
location /dev/ {
    absolute_redirect off;

    # grpc_pass grpc://dev:5000;
    proxy_pass http://dev:5001/;

    # Set default headers for proxy
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # Set PathBase
    proxy_set_header X-Forwarded-Prefix /dev;

    # Set buffering options to disable buffering for gRPC
    proxy_buffering off;
    proxy_request_buffering off;

    # Set Timeouts
    proxy_connect_timeout   60s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
}

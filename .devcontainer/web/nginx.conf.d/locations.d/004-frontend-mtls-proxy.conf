# Development proxy for the web application with client certificate authentication

# Client certificate validation settings
# Setting it within the location is unstable, so it needs to be set for the entire server.
ssl_client_certificate /etc/ssl/local/mtls/external-ca.crt;
ssl_verify_client optional;

location /secure-external/ {
    absolute_redirect off;
    if ($ssl_client_verify != SUCCESS) {
        # If the certificate is missing or invalid, a 403 Forbidden error will be returned.
        return 403;
    }

    proxy_pass https://dev:7001/;

    # Set default headers for proxy
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # Set PathBase
    proxy_set_header X-Forwarded-Prefix /secure-external;

    # Pass client certificate information to ASP.NET Core
    proxy_set_header X-Client-Cert      $ssl_client_escaped_cert;

    # Client certificate presented by Nginx to ASP.NET Core
    proxy_ssl_certificate           /etc/ssl/local/mtls/internal-web.crt;
    proxy_ssl_certificate_key       /etc/ssl/local/mtls/internal-web.key;

    # CA for validating ASP.NET Core server certificates
    proxy_ssl_trusted_certificate   /etc/ssl/local/mtls/internal-ca.crt;
    proxy_ssl_verify on;
    proxy_ssl_verify_depth 2;
}

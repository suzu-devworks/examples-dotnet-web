server {
    listen 8443         ssl;
    listen [::]:8443    ssl ipv6only=on;
    http2 on;
    server_name         _;
    server_tokens       off;
    port_in_redirect    off;

    error_log           /var/log/nginx/error.log debug;

    ssl_certificate     /etc/ssl/local/localhost.crt;
    ssl_certificate_key /etc/ssl/local/localhost.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE+AESGCM:DHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5;
    ssl_conf_command Ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_128_CCM_SHA256:TLS_AES_128_CCM_8_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;
    ssl_prefer_server_ciphers on;

    ssl_session_cache   shared:SSL:1m;
    ssl_session_timeout 5m;

    add_header Strict-Transport-Security "max-age=15768000; includeSubdomains" always;

    # redirect server error pages to the static page /50x.html
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # Client certificate validation settings
    # Setting it within the location is unstable, so it needs to be set for the entire server.
    ssl_client_certificate /etc/ssl/local/mtls/external-ca.crt;
    ssl_verify_client optional;

    location / {
        absolute_redirect off;
        if ($ssl_client_verify != SUCCESS) {
            # If the certificate is missing or invalid, a 403 Forbidden error will be returned.
            return 403;
        }

        proxy_pass http://dev:5001/;

        # Set default headers for proxy
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Set PathBase
        proxy_set_header X-Forwarded-Prefix /;

        # Pass client certificate information to ASP.NET Core
        proxy_set_header X-Client-Cert      $ssl_client_escaped_cert;
    }
}
